name: Repository Generator (check)

on:
  pull_request:
    branches:
      - main

concurrency:
  group: repository-generator-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REPOSITORY_GENERATOR_REPO: 'https://github.com/bluecontract/blue-js.git'
  REPOSITORY_GENERATOR_REF: 'fd96a783148da3a718d4108fc7364fd129e253ef'
  BLUE_REPOSITORY_PATH: 'BlueRepository.blue'

jobs:
  Check:
    name: Validate repository changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run repository-generator (check)
        shell: bash
        run: |
          set -euo pipefail

          .github/scripts/run-repository-generator-from-blue-js.sh check "${BLUE_REPOSITORY_PATH}" --allow-diff
